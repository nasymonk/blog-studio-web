<!doctype html>
<html lang="zh-CN" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Blog Studio 博客管理后台" />
    <meta name="theme-color" content="#fdfcf8" />
    <link rel="icon" href="/studio/favicon.svg" type="image/svg+xml" />
    <title>Blog Studio · 博客工作台</title>
    <script>
      (function() {
        var t = localStorage.getItem('blog-studio-theme');
        if (t === 'dark') {
          document.documentElement.setAttribute('data-theme', 'dark');
          document.querySelector('meta[name="theme-color"]').content = '#18191b';
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
